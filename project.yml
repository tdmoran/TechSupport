name: TechSupport
options:
  bundleIdPrefix: com.techsupport
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  TechSupport:
    type: application
    platform: macOS
    sources:
      - TechSupport
    dependencies:
      - package: SwiftTerm
      - target: TechSupportWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.techsupport.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSUIElement: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: TechSupport
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: TechSupport/TechSupport.entitlements
        ENABLE_APP_SANDBOX: "NO"
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_NAME: TechSupport
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: TechSupport/TechSupport.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  TechSupportWidget:
    type: extensionkit-extension
    platform: macOS
    sources:
      - TechSupportWidget
    info:
      path: TechSupportWidget/Info.plist
      properties:
        CFBundleDisplayName: TechSupport Widget
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.widgetkit-extension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.techsupport.app.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_APP_SANDBOX: "NO"
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_NAME: TechSupportWidget
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SKIP_INSTALL: "YES"

  TechSupportTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TechSupportTests
    dependencies:
      - target: TechSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.techsupport.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TechSupport.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TechSupport"
        BUNDLE_LOADER: "$(TEST_HOST)"
